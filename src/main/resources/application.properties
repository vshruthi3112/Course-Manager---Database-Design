# ============================================================
# APPLICATION PROPERTIES
# ============================================================
# This file is like a .env file in a Node.js project.
# Spring Boot reads these settings on startup.
# ============================================================

# ------------------------------------------------------------
# DATABASE CONNECTION (MySQL)
# ------------------------------------------------------------
# The URL to connect to your MySQL database
# Format: jdbc:mysql://host:port/database_name
# Make sure you've created this database in MySQL first!
# Run in MySQL: CREATE DATABASE course_manager_db;
spring.datasource.url=jdbc:mysql://localhost:3306/course_manager_db

# Your MySQL username (default is usually "root")
spring.datasource.username=root

# Your MySQL password (change this to YOUR password)
spring.datasource.password=root1234

# The JDBC driver class (MySQL connector)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------------------------------
# JPA / HIBERNATE SETTINGS
# ------------------------------------------------------------
# ddl-auto controls how Hibernate manages the database schema:
#   - "create"       → Drop & recreate tables every time (loses data!)
#   - "create-drop"  → Same as create, but drops on shutdown
#   - "update"       → Only add new columns/tables, never removes (good for dev)
#   - "validate"     → Only check schema matches entities, don't change anything
#   - "none"         → Do nothing
#
# For learning, "update" is perfect - it creates tables automatically!
spring.jpa.hibernate.ddl-auto=update

# Show the SQL queries Hibernate generates in the console
# GREAT for learning - you'll see exactly what SQL JPA creates
spring.jpa.show-sql=true

# Format the SQL output so it's readable
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we're using MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------
# SERVER SETTINGS
# ------------------------------------------------------------
# The port our server runs on (like Express listening on port 8080)
server.port=8080

# Give our app a name
spring.application.name=course-manager
